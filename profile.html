<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Card</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a;
  --ink-mid: #555;
  --ink-light: #999;
  --line: #e8e8e8;
  --bg: #f2f2f2;
  --white: #fff;
  --gold: #b8955a;
  --gold-pale: #f7f0e6;
  --green: #2a6a3a;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ヘッダー */
.hdr{background:var(--white);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:9px;}
.hdr-box{width:28px;height:28px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Cormorant Garamond',serif;font-size:13px;}
.hdr-name{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.08em;}
.hdr-sub{font-size:8px;letter-spacing:.18em;color:var(--ink-light);display:block;text-transform:uppercase;}

.container{max-width:540px;margin:0 auto;padding:24px 16px 80px;}

/* ローディング */
.loading{text-align:center;padding:80px 20px;color:var(--ink-light);font-size:13px;}

/* エラー */
.error{text-align:center;padding:80px 20px;}
.error h2{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:300;margin-bottom:8px;}
.error p{font-size:13px;color:var(--ink-light);}

/* 名刺カード */
.card{background:var(--white);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-md);}
.card-cover{height:80px;background:linear-gradient(135deg,#1a1a1a,#3a3a3a);position:relative;overflow:hidden;}
.card-cover img{width:100%;height:100%;object-fit:cover;}
.card-cover-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a1a1a 0%,#1a1a1a 65%,#e8b422 65%,#e8b422 82%,transparent 82%);}
.card-body{padding:20px 18px 16px;display:flex;gap:14px;align-items:flex-start;position:relative;}
.card-logo{width:56px;height:56px;border-radius:6px;border:1px solid var(--line);object-fit:contain;background:#fafafa;flex-shrink:0;}
.card-logo-ph{width:56px;height:56px;border-radius:6px;border:1px solid var(--line);background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink-light);flex-shrink:0;}
.card-photo{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--white);position:absolute;top:-24px;right:18px;box-shadow:var(--shadow-sm);}
.card-names{flex:1;}
.card-company{font-size:10px;color:var(--ink-light);margin-bottom:3px;letter-spacing:.06em;}
.card-dept-title{font-size:9px;color:var(--ink-light);margin-bottom:6px;}
.card-name{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:400;letter-spacing:.04em;color:var(--ink);}
.card-kana{font-size:9px;color:var(--ink-light);letter-spacing:.1em;margin-top:2px;}
.card-catch{font-size:11px;color:var(--gold);font-style:italic;margin-top:4px;font-family:'Cormorant Garamond',serif;letter-spacing:.06em;}

/* 連絡先 */
.section{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px;}
.sec-title{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.contact-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
.contact-item:last-child{border-bottom:none;}
.ci-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-light);width:40px;flex-shrink:0;}
.ci-value{font-size:13px;color:var(--ink);flex:1;word-break:break-all;}
.ci-value a{color:var(--ink);text-decoration:none;}
.ci-value a:hover{color:var(--gold);}

/* 自由記入 */
.free-text{font-size:13px;color:var(--ink-mid);line-height:1.8;}

/* CTA */
.cta-area{display:flex;flex-wrap:wrap;gap:10px;}
.cta-btn{
  flex:1;min-width:120px;padding:13px 16px;
  background:var(--ink);color:#fff;border-radius:10px;
  font-size:12px;letter-spacing:.06em;text-align:center;
  text-decoration:none;display:block;transition:background .2s;
}
.cta-btn:hover{background:#333;}

/* SNS */
.sns-area{display:flex;flex-wrap:wrap;gap:8px;}
.sns-tag{
  padding:8px 16px;border:1px solid var(--line);border-radius:20px;
  font-size:11px;color:var(--ink-mid);text-decoration:none;
  transition:all .2s;
}
.sns-tag:hover{border-color:var(--ink);color:var(--ink);}

/* 保存ボタン */
.save-btn{
  width:100%;padding:16px;background:var(--green);color:#fff;
  border:none;border-radius:12px;font-size:14px;letter-spacing:.08em;
  cursor:pointer;margin-bottom:10px;transition:background .2s;
  font-family:'Noto Sans JP',sans-serif;
}
.save-btn:hover{background:#235423;}
.share-btn{
  width:100%;padding:13px;border:1px solid var(--ink);background:transparent;
  color:var(--ink);border-radius:12px;font-size:13px;letter-spacing:.06em;
  cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
}
.share-btn:hover{background:var(--ink);color:#fff;}

/* フッター */
footer{text-align:center;padding:24px;font-size:10px;color:var(--ink-light);letter-spacing:.1em;border-top:1px solid var(--line);}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-box">名</div>
  <div>
    <span class="hdr-name">Signature Card</span>
    <span class="hdr-sub">総合デジタル名刺サービス</span>
  </div>
</header>

<div class="container">
  <div class="loading" id="loading">読み込み中...</div>
  <div id="content" style="display:none"></div>
  <div class="error" id="error" style="display:none">
    <h2>名刺が見つかりません</h2>
    <p>URLが正しいかご確認ください。</p>
  </div>
</div>

<footer>Signature Card — 総合デジタル名刺サービス</footer>

<script>
const WORKER_URL = 'https://loop-gemini-proxy.koshiro-katsura.workers.dev';

async function loadProfile() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(!id) { showError(); return; }

  try {
    const res = await fetch(`${WORKER_URL}/profile?id=${id}`);
    if(!res.ok) { showError(); return; }
    const d = await res.json();
    renderProfile(d);
  } catch(e) {
    showError();
  }
}

function renderProfile(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.title = `${d.name} | Signature Card`;

  const CTA_LABELS = {
    line:'💬 LINE相談', booking:'📅 予約する', hp:'🌐 HPを見る',
    seminar:'🎓 セミナー申込', contact:'✉️ お問い合わせ', other:'🔗 リンク'
  };
  const LINK_LABELS = {
    hp:'HP', lp:'LP', shop:'Shop', blog:'Blog', portfolio:'Portfolio', other:'Link'
  };

  let html = '';

  // 名刺カード
  html += `<div class="card">
    <div class="card-cover" id="cover">
      <div class="card-cover-bar"></div>
    </div>
    <div class="card-body">
      <div id="logo"></div>
      <div class="card-names">
        <div class="card-company">${d.company||''}</div>
        <div class="card-dept-title">${[d.dept,d.title].filter(Boolean).join(' / ')}</div>
        <div class="card-name">${d.name||''}</div>
        ${d.nameKana?`<div class="card-kana">${d.nameKana}</div>`:''}
        ${d.catchcopy?`<div class="card-catch">${d.catchcopy}</div>`:''}
      </div>
    </div>
  </div>`;

  // 連絡先
  const contacts = [];
  if(d.phone)   contacts.push({label:'TEL',  value:`<a href="tel:${d.phone}">${d.phone}</a>`});
  if(d.fax)     contacts.push({label:'FAX',  value:d.fax});
  if(d.email)   contacts.push({label:'Mail', value:`<a href="mailto:${d.email}">${d.email}</a>`});
  if(d.address) contacts.push({label:'住所', value:d.address});
  if(d.links && d.links.length) {
    d.links.forEach(l => {
      const label = LINK_LABELS[l.type] || 'Link';
      contacts.push({label, value:`<a href="${l.url}" target="_blank">${l.url}</a>`});
    });
  }
  if(contacts.length) {
    html += `<div class="section">
      <div class="sec-title">Contact</div>
      ${contacts.map(c=>`<div class="contact-item"><span class="ci-label">${c.label}</span><span class="ci-value">${c.value}</span></div>`).join('')}
    </div>`;
  }

  // 自由記入
  if(d.freeText) {
    html += `<div class="section">
      <div class="sec-title">About</div>
      <div class="free-text">${d.freeText}</div>
    </div>`;
  }

  // CTA
  if(d.cta && d.cta.length) {
    html += `<div class="section">
      <div class="sec-title">Action</div>
      <div class="cta-area">
        ${d.cta.map(c=>`<a href="${c.url}" class="cta-btn" target="_blank">${CTA_LABELS[c.type]||c.type}</a>`).join('')}
      </div>
    </div>`;
  }

  // SNS
  const sns = [];
  if(d.line)      sns.push({label:'💬 LINE',      url:`https://line.me/ti/p/~${d.line}`});
  if(d.instagram) sns.push({label:'📸 Instagram', url:`https://instagram.com/${d.instagram.replace('@','')}`});
  if(d.twitter)   sns.push({label:'𝕏 X',          url:`https://x.com/${d.twitter.replace('@','')}`});
  if(d.facebook)  sns.push({label:'📘 Facebook',  url:d.facebook.startsWith('http')?d.facebook:`https://${d.facebook}`});
  if(d.linkedin)  sns.push({label:'in LinkedIn',  url:d.linkedin.startsWith('http')?d.linkedin:`https://${d.linkedin}`});
  if(sns.length) {
    html += `<div class="section">
      <div class="sec-title">SNS</div>
      <div class="sns-area">
        ${sns.map(s=>`<a href="${s.url}" class="sns-tag" target="_blank">${s.label}</a>`).join('')}
      </div>
    </div>`;
  }

  // 保存ボタン
  html += `<button class="save-btn" onclick="saveContact()">📱 連絡先に保存</button>`;
  html += `<button class="share-btn" onclick="shareProfile()">🔗 このページを共有</button>`;

  document.getElementById('content').innerHTML = html;

  // ロゴ
  const logoEl = document.getElementById('logo');
  if(logoEl) {
    logoEl.innerHTML = `<div class="card-logo-ph">${(d.name||'名').charAt(0)}</div>`;
  }

  // vCard保存
  window._profileData = d;
}

function saveContact() {
  const d = window._profileData;
  if(!d) return;
  const vcard = [
    'BEGIN:VCARD','VERSION:3.0',
    `FN:${d.name}`,
    d.nameKana ? `SOUND;X-IRMC-N:${d.nameKana}` : '',
    `ORG:${d.company}${d.dept?';'+d.dept:''}`,
    d.title   ? `TITLE:${d.title}` : '',
    d.phone   ? `TEL;TYPE=WORK,VOICE:${d.phone}` : '',
    d.fax     ? `TEL;TYPE=WORK,FAX:${d.fax}` : '',
    d.email   ? `EMAIL;TYPE=WORK:${d.email}` : '',
    d.address ? `ADR;TYPE=WORK:;;${d.address};;;;` : '',
    d.freeText? `NOTE:${d.freeText}` : '',
    `URL:${window.location.href}`,
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  // Android対応
  const ua = navigator.userAgent.toLowerCase();
  const isAndroid = ua.includes('android');

  const blob = new Blob([vcard], {type:'text/vcard'});
  const url = URL.createObjectURL(blob);

  if(isAndroid) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `${d.name.replace(/\s/g,'_')}.vcf`;
    a.click();
  } else {
    const a = document.createElement('a');
    a.href = url;
    a.download = `${d.name.replace(/\s/g,'_')}.vcf`;
    a.click();
  }
}

function shareProfile() {
  if(navigator.share) {
    navigator.share({title:`${window._profileData?.name||''}の名刺`, url:window.location.href});
  } else {
    navigator.clipboard.writeText(window.location.href).then(()=>alert('URLをコピーしました'));
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
}

loadProfile();
</script>
</body>
</html>
